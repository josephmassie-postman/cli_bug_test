$kind: http-example
request:
  url: "{{baseUrl}}/spacecrafts/:spacecraftId"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-Api-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: spacecraftId
      value: string
      description: The unique identifier of the spacecraft
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "string",
        "name": "string",
        "type": "probe",
        "description": "string"
      }
order: 1000
