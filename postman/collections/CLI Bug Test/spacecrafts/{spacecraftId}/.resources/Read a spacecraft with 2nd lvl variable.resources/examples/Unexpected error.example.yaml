$kind: http-example
request:
  url: "{{baseUrl}}/spacecrafts/:spacecraftId"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-Api-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: spacecraftId
      value: string
      description: The unique identifier of the spacecraft
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string"
      }
order: 3000
