$kind: http-example
request:
  url: "{{baseUrl}}/accounts/:accountNumber"
  method: PATCH
  headers:
    - key: x-mock-response-code
      value: "200"
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    accountNumber: "{{accountNumber}}"
  body:
    type: json
    content: |-
      {
        "holder": {
          "address": {
            "city": "{{$city}}",
            "country": "{{$country}}",
            "street": "{{$street}}"
          },
          "dob": "{{$dob}}",
          "name": {
            "first": "{{$firstName}}",
            "last": "{{$lastName}}",
            "middle": "{{$middleName}}"
          }
        },
        "type": "{{$accountType}}"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "details": {
          "domestic": {
            "account": "02560233",
            "routing": "71993962"
          },
          "international": {
            "bic": "PYAUISI1",
            "iban": "{{$queryParams 'accountNumber'}}"
          }
        },
        "type": "Investment Account"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "details": {
            "type": "object",
            "properties": {
              "domestic": {
                "type": "object",
                "properties": {
                  "account": {
                    "type": "string"
                  },
                  "routing": {
                    "type": "string"
                  }
                }
              },
              "international": {
                "type": "object",
                "properties": {
                  "bic": {
                    "type": "string"
                  },
                  "iban": {
                    "type": "string"
                  }
                }
              }
            }
          },
          "type": {
            "type": "string"
          }
        }
      }
order: 1000
