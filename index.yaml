      tags:
        - Statement
      description: >-
        ### Retrieve Latest Account Statement


        This endpoint retrieves the latest statement for a specific account
        identified by the `accountNumber`. It provides a summary of the
        account's financial activity over a defined period, including balances,
        money flow, and individual transactions.


        #### Request Parameters


        - **accountNumber** (path parameter): The unique identifier for the
        account whose latest statement is being requested. Ensure that the
        `accountNumber` is valid to receive the correct statement.
            

        #### Response Format


        The response will be a JSON object containing the following structure:


        - **balance**: An object representing the account balance.
            
            - **closing**: The closing balance of the account.
                
            - **opening**: The opening balance of the account.
                
        - **money**: An object detailing the money flow.
            
            - **in**: Total amount of money received.
                
            - **out**: Total amount of money spent.
                
        - **period**: An object indicating the statement period.
            
            - **from**: The start date of the statement period.
                
            - **to**: The end date of the statement period.
                
        - **transactions**: An array of transaction objects, each containing:
            
            - **amount**: The amount of the transaction.
                
            - **balance**: The balance after the transaction.
                
            - **date**: The date of the transaction.
                
            - **description**: A brief description of the transaction.
                
            - **type**: The type of the transaction (e.g., debit, credit).
                

        #### Notes


        - The response will contain all transactions within the specified
        period, along with the relevant balance information.
    parameters:
      - name: accountNumber
        in: path
        required: true
        schema:
          type: string
        example: '{{accountNumber}}'
  /accounts/{accountNumber}:
    get:
      summary: Overview request
      responses:
        '200':
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: object
                    properties:
                      available:
                        type: number
                      present:
                        type: number
                  details:
                    type: object
                    properties:
                      domestic:
                        type: object
                        properties:
                          account:
                            type: string
                          routing:
                            type: string
                      international:
                        type: object
                        properties:
                          bic:
                            type: string
                          iban:
                            type: string
                  interestRate:
                    type: number
                  lastStatementDate:
                    type: string
                  type:
                    type: string
              example:
                balance:
                  available: 109.58
                  present: 344.54
                details:
                  domestic:
                    account: '34183769'
                    routing: '69437301'
                  international:
                    bic: AAQIMWT1
                    iban: '{AL10010054848GYQ8536W4967Q3R}'
                interestRate: 0.01
                lastStatementDate: Tue Oct 10 2023 00:41:55 GMT-0500 (Central Daylight Time)
                type: Savings Account
      security:
        - BearerAuth: []
      description: >-
        ### Retrieve Account Information


        This endpoint allows you to retrieve detailed information about a
        specific account using its account number. It provides insights into the
        account's balance, details, interest rate, and other relevant
        information.


        #### Request Parameters


        - **accountNumber** (path parameter): The unique identifier for the
        account you wish to access. This should be provided in the URL.
            

        #### Expected Response


        On a successful request, the response will include the following
        information:


        - **balance**: An object containing:
            
            - **available**: The amount of funds available for withdrawal.
                
            - **present**: The total amount currently present in the account.
                
        - **details**: An object providing account details:
            
            - **domestic**: An object containing:
                
                - **account**: The domestic account number.
                    
                - **routing**: The domestic routing number.
                    
            - **international**: An object containing:
                
                - **bic**: The Bank Identifier Code for international transactions.
                    
                - **iban**: The International Bank Account Number.
                    
        - **interestRate**: The interest rate applicable to the account.
            
        - **lastStatementDate**: The date of the last statement issued for the
        account.
            
        - **type**: The type of account (e.g., savings, checking).
            

        #### Notes


        - Ensure that the account number provided is valid; otherwise, the
        request may return an error.
            
        - The response will be in JSON format, providing a structured overview
        of the account's status and details.
    parameters:
      - name: accountNumber
        in: path
        required: true
        schema:
          type: string
        example: '{{accountNumber}}'
    patch:
      summary: Update
      parameters:
        - name: x-mock-response-code
          in: header
          required: false
          schema:
            type: integer
          example: 200
      responses:
        '200':
          description: Update Account
          content:
            application/json:
              schema:
                type: object
                properties:
                  details:
                    type: object
                    properties:
                      domestic:
                        type: object
                        properties:
                          account:
                            type: string
                          routing:
                            type: string
                      international:
                        type: object
                        properties:
                          bic:
                            type: string
                          iban:
                            type: string
                  type:
                    type: string
              example:
                details:
                  domestic:
                    account: '02560233'
                    routing: '71993962'
                  international:
                    bic: PYAUISI1
                    iban: '{{$queryParams ''accountNumber''}}'
                type: Investment Account
      description: >-
        ## PATCH /accounts/:accountNumber


        This endpoint allows you to update the details of a specific account
        identified by `accountNumber`. The request is made using the HTTP PATCH
        method, which is typically used for partial updates to resources.


        ### Request Body


        The request requires a JSON payload with the following structure:


        - **holder** (object): Contains the account holder's information.
            
            - **address** (object): The address details of the account holder.
                
                - **city** (string): The city where the account holder resides.
                    
                - **country** (string): The country of the account holder.
                    
                - **street** (string): The street address of the account holder.
                    
            - **dob** (string): The date of birth of the account holder.
                
            - **name** (object): The name details of the account holder.
                
                - **first** (string): The first name of the account holder.
                    
                - **last** (string): The last name of the account holder.
                    
                - **middle** (string): The middle name of the account holder (optional).
                    
        - **type** (string): The type of account being updated.
            

        ### Response


        The response will return a status code indicating the result of the
        request. A successful update typically returns a JSON object with
        account details. However, if the account is not found, a `404 Not Found`
        status will be returned, along with an error message in JSON format:


        ``` json

        {
          "error": ""
        }

         ```

        In case of a successful update, the response may look like this:


        ``` json

        {
          "details": {
            "domestic": {
              "account": "",
              "routing": ""
            },
            "international": {
              "bic": "",
              "iban": ""
            }
          },
          "type": ""
        }

         ```

        ### Notes


        - Ensure that the `accountNumber` in the URL is valid and corresponds to
        an existing account.
            
        - The payload must be correctly formatted as per the specified structure
        to avoid errors.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                holder:
                  type: object
                  properties:
                    address:
                      type: object
                      properties:
                        city:
                          type: string
                        country:
                          type: string
                        street:
                          type: string
                    dob:
                      type: string
                    name:
                      type: object
                      properties:
                        first:
                          type: string
                        last:
                          type: string
                        middle:
                          type: string
                type:
                  type: string
            example:
              holder:
                address:
                  city: '{{$city}}'
                  country: '{{$country}}'
                  street: '{{$street}}'
                dob: '{{$dob}}'
                name:
                  first: '{{$firstName}}'
                  last: '{{$lastName}}'
                  middle: '{{$middleName}}'
              type: '{{$accountType}}'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
security:
  - BearerAuth: []
